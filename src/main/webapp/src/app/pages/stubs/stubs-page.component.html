<!-- Header -->
<header class="wiremock-header">
  <div class="header-left">
    <h1>Stubs</h1>
    <p class="header-subtitle">An API consisting of assorted stubs</p>
  </div>
  <div class="header-actions">
    <!-- Selection buttons (always visible) -->
    <div class="btn-group me-2">
      <button class="btn btn-sm btn-outline-secondary" (click)="selectAllStubs()" title="Select all">
        <i class="fas fa-check-double"></i>
      </button>
      <button class="btn btn-sm btn-outline-secondary" (click)="deselectAllStubs()" title="Deselect all">
        <i class="fas fa-times"></i>
      </button>
      <button class="btn btn-sm btn-outline-primary" (click)="exportStubs(true)" [disabled]="selectedCount === 0" title="Export selected">
        <i class="fas fa-download"></i> Export ({{selectedCount}})
      </button>
      <button class="btn btn-sm btn-outline-danger" (click)="deleteSelectedStubs()" [disabled]="selectedCount === 0" title="Delete selected">
        <i class="fas fa-trash"></i> Delete ({{selectedCount}})
      </button>
    </div>

    <!-- Dropdown Export/Import -->
    <div class="btn-group me-2" ngbDropdown>
      <button class="btn btn-sm btn-outline-secondary" ngbDropdownToggle>
        <i class="fas fa-file-export"></i> Export/Import
      </button>
      <div class="dropdown-menu dropdown-menu-end" ngbDropdownMenu>
        <button class="dropdown-item" (click)="exportStubs(false)">
          <i class="fas fa-download"></i> Export All Stubs
        </button>
        <button class="dropdown-item" (click)="openImportModal()">
          <i class="fas fa-upload"></i> Import Stubs
        </button>
      </div>
    </div>

    <button class="btn btn-sm btn-primary" (click)="createNewStub()">
      <i class="fas fa-plus"></i> Create Stub
    </button>
  </div>
</header>

<!-- Content -->
<div class="wiremock-content">
  <!-- Left Panel: Stubs List -->
  <div class="stubs-panel">
    <div class="stubs-header">
      <h2>Stubs</h2>
      <button class="btn btn-link btn-sm" (click)="refreshStubs()">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>

    <app-stub-list
      [mappings]="mappings"
      [selectedMapping]="selectedMapping"
      [loading]="loading"
      [error]="error"
      [searchQuery]="searchQuery"
      [currentPage]="currentPage"
      [pageSize]="pageSize"
      [totalMappings]="totalMappings"
      [selectedStubIds]="selectedStubIds"
      (stubSelected)="selectStub($event)"
      (searchChanged)="onSearchChange($event)"
      (pageChanged)="onPageChange($event)"
      (selectionToggled)="onSelectionToggled($event)"
      (selectAllRequested)="selectAllStubs()"
      (deselectAllRequested)="deselectAllStubs()"
      (refreshRequested)="refreshStubs()"
      (createNewRequested)="createNewStub()"
    ></app-stub-list>
  </div>

  <!-- Right Panel: Stub Details -->
  <div class="details-panel">
    <app-stub-detail
      [selectedMapping]="selectedMapping"
      (editRequested)="editStub()"
      (cloneRequested)="cloneStub()"
      (deleteRequested)="deleteStub()"
      (closeRequested)="closeDetails()"
    ></app-stub-detail>
  </div>
</div>

<!-- Create/Edit Stub Modal (self-managed) -->
<app-stub-editor
  [availableScenarios]="availableScenarios"
  (saved)="onStubSaved($event)"
></app-stub-editor>

<!-- Import Stubs Modal (self-managed) -->
<app-stub-import
  (importCompleted)="loadMappings()"
></app-stub-import>
