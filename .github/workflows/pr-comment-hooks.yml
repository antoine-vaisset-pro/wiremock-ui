name: PR Comment Hooks

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ── Parse the comment and check it is a /deploy command on a PR ──────────────
  parse:
    name: Parse command
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request != null
    outputs:
      command: ${{ steps.parse.outputs.command }}
      pr_sha: ${{ steps.pr.outputs.sha }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Parse slash command
        id: parse
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          COMMAND=$(echo "$BODY" | tr -d '[:space:]' | head -c 20)
          if [ "$COMMAND" = "/deploy" ]; then
            echo "command=deploy" >> "$GITHUB_OUTPUT"
          else
            echo "command=" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR details
        id: pr
        if: steps.parse.outputs.command == 'deploy'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          SHA=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

  # ── Check that the actor has write permission ─────────────────────────────────
  check-permission:
    name: Check deploy permission
    needs: parse
    runs-on: ubuntu-latest
    if: needs.parse.outputs.command == 'deploy'
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check collaborator permission
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          PERM=$(gh api repos/$REPO/collaborators/$ACTOR/permission --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$PERM" == "admin" || "$PERM" == "write" || "$PERM" == "maintain" ]]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── React when deploy is denied ───────────────────────────────────────────────
  deny:
    name: React – deploy denied
    needs: check-permission
    runs-on: ubuntu-latest
    if: needs.check-permission.outputs.allowed == 'false'
    steps:
      - name: Add confused reaction
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: confused

  # ── React to acknowledge the command ─────────────────────────────────────────
  allow:
    name: React – command acknowledged
    needs: check-permission
    runs-on: ubuntu-latest
    if: needs.check-permission.outputs.allowed == 'true'
    steps:
      - name: Add rocket reaction
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: rocket

  # ── /deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Trigger Netlify deploy
    needs: [parse, check-permission]
    if: needs.parse.outputs.command == 'deploy' && needs.check-permission.outputs.allowed == 'true'
    uses: ./.github/workflows/deploy-netlify.yml
    with:
      ref: ${{ needs.parse.outputs.pr_sha }}
    secrets: inherit

  # ── Post the deploy result back as a PR comment ───────────────────────────────
  deploy-result:
    name: React – deploy result
    needs: [parse, deploy]
    runs-on: ubuntu-latest
    if: always() && needs.parse.outputs.command == 'deploy' && needs.parse.outputs.pr_sha != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post result comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.parse.outputs.pr_number }}
          ACTOR: ${{ github.event.comment.user.login }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_URL: ${{ needs.deploy.outputs.deploy_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            BODY="✅ @$ACTOR – Netlify preview deployed successfully!"$'\n'"🔗 **Preview URL:** $DEPLOY_URL"
          else
            BODY="❌ @$ACTOR – Netlify deploy failed. Check the [workflow run](https://github.com/$REPO/actions) for details."
          fi
          gh api repos/$REPO/issues/$PR_NUMBER/comments \
            --method POST \
            --field body="$BODY"
