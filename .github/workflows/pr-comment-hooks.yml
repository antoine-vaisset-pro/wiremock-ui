name: PR Comment Hooks

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ── Dispatch slash commands via peter-evans/slash-command-dispatch ────────────
  slashcommand:
    name: Dispatch slash commands
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request != null
    steps:
      - name: Dispatch commands
        uses: peter-evans/slash-command-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commands: |
            deploy
          permission: admin
          reactions: true
          reaction-token: ${{ secrets.GITHUB_TOKEN }}

  # ── /deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Trigger Netlify deploy
    if: github.event.client_payload.slash_command.command == 'deploy'
    uses: ./.github/workflows/deploy-netlify.yml
    with:
      ref: ${{ github.event.client_payload.pull_request.head.sha }}
    secrets: inherit

  deploy-result:
    name: React – deploy result
    needs: deploy
    runs-on: ubuntu-latest
    if: always() && github.event.client_payload.slash_command.command == 'deploy'
    permissions:
      pull-requests: write
    steps:
      - name: Post result comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.client_payload.pull_request.number }}
          ACTOR: ${{ github.event.client_payload.github.actor }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_URL: ${{ needs.deploy.outputs.deploy_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            BODY="✅ @$ACTOR – Netlify preview deployed successfully!"$'\n'"🔗 **Preview URL:** $DEPLOY_URL"
          else
            BODY="❌ @$ACTOR – Netlify deploy failed. Check the [workflow run](https://github.com/$REPO/actions) for details."
          fi
          gh api repos/$REPO/issues/$PR_NUMBER/comments \
            --method POST \
            --field body="$BODY"
