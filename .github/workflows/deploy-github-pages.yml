name: Deploy to GitHub Pages

on:
  # Runs on pushes to main only
  push:
    branches:
      - main
  # Allows manual workflow dispatch
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # DISABLED - workflow inhibé temporairement
    if: false
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'src/main/webapp/package-lock.json'

      - name: Install dependencies
        working-directory: src/main/webapp
        run: npm ci

      - name: Build Angular app
        working-directory: src/main/webapp
        run: npm run build -- --base-href=/wiremock-ui/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: src/main/webapp/dist/wiremock-ui/browser

  deploy:
    # Deploy on push to main or manual trigger
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
